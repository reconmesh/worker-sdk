name: ci
on: [push, pull_request]

permissions:
  contents: read

jobs:
  vet-test-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: true
      - run: go mod download
      - run: go vet ./...
      - run: go test -short -race -count=1 ./...
      - run: go build ./...
